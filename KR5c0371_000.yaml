front:
  text: 唐嵩高山啓母廟碑銘并序
  hash: sha256:4a260937d3f7f38f6e3996d0c52214f8c6839cc6071e375e357144f55f5263d3
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0371_HFL_000-001a, image: hfl/0610/0610-130.png}
body:
  text: 登仕郎崇文館直學士臣崔融奉勑譔臣聞天地生成其法自然之謂道陰陽鼓舞其功不測之謂神然則物或類感事因通變乾棟傾而三光北馳坤輿缺而百川東瀉河淪越雋有郡邑之爲魚水陷歷陽有吏人之化鼈訪遺蹤於女峽風雨蕭條徴往事於姑泉弦歌響亮盈虛靡定合散焉常不知誰子旣老氏之多情忽然爲人寧賈生之足辯仰觀俯察裁識幽明之故原始反終未窮死生之說得於道而失於道義有必然出於機而入於機理無或廢知變化者其知神之所爲乎臣謹按啓母廟者蓋夏后啓之母也漢避景帝諱啓之宇曰開厥後相傳或為開母而顧野王輿地志盧元明嵩高紀並不尋避諱之旨以爲陽翟婦人事不經見諒無所取粤若玉斗璇璣李母之居鄰北極金臺石室王母之宅在西山氣爲母則群物以萌曰爲母則容光必照坤爲母則上下交泰后爲母則邦家有成故華胥履迹而雄氏孕女登感神而炎運作星流華渚而白帝生月貫幽房而黑精降明明有夏穆穆嵞山予娶於度土之辰女婚於台桑之地搜奇帝紀摭異歸藏束生發蒙而有迷韓子稱賢而不朽漢臣之筆墨泉海陳其令名秦相之一宇千金叙其嘉應士歌南國徒聞候禹之詞石破北方終見生余之兆則郭璞所謂陽城西啓母石李彤所謂嵩山南啓母祠隨巢之說有徴鴻烈之言無爽者矣昔者鸞川之上母變空桑豚水之濱男生破竹美人之虹名螮蝀仙婦之月作瞻蜍精衛銜木而償冤女尸化草而成媚山崩蜀道臺候婦而無歸石立武昌亭望夫而不及論乎誕載群下莫尊於帝王語乎遷易凡百無聞於感致美矣哉不可得而稱也大唐革去故鼎取新與運而生繼天而作握乾元而造物海内知春闢混沌而爲家域中無外天皇膺歷數順謳歌金匱玉板服文武之能事衢室廟堂承祖宗之茂烈垂衣裳而作元后端拱北辰負黼扆而朝諸侯嚮明南面周邦赫赫其道洽於成康漢室巍巍其化鍾於文景東漸西被遠安邇肅海三年而無波雲連月而不散天瑞降地符昇靈鳳五文歳時來苑囿神龍八卦昏旦游池沼禮云乎哉無取於周旋揖讓樂之謂也必在於移風易俗司禄益富家國於是乎有餘司命益年臣人於是乎不天明王三懼未嘗遺戒慎之心天子四鄰莫能展弼諧之用家安其業但聽於鄰雞人得其和遂同於野鹿表識記奏河圖四十六事之著明曷云尚也登太山禫梁甫七十二封之可識何以加乎且夫窮聖神備道德滋萌元氣開關太初斯乃天皇氏之所以應乎天也依土地明神靈駕六羽而上騰度九州而下濟斯乃人皇氏之所以順乎人也造書契教畋漁合五緯而節四時登九天而類萬物斯乃犧皇氏之所以制人法也務播殖該變通嘗藥以救兆人聚貨而交天下斯乃農皇氏之所以興人利也振夔鼓載龍旗天則玄女授符帝則黄神降斗期乃軒轅氏之所以除人害也均度量正都邑總秋令於金天分瑞官於鳳紀斯乃帝昊氏之所以爲人極也潔祭祀義鬼神履時以象天養財以任地斯乃帝頊氏之所以爲人教也秋乘馬春乘龍順三辰而天道平建五正而人事理斯乃帝辛氏之所以爲人政也明如曰晦如陰人無識其名帝何力於我斯乃帝堯氏之所以昭君德也聞一善舉八才帝唱動而爛星雲天歌發而蹌鳥獸斯乃帝舜氏之所以章后功也夫三統者道之大五行者生之宗三皇法之而列五帝則之而序道以三興德以五立非天下之至聖孰能兼於此乎而猶雖休勿休損之又損下明詔發德音尊天而重人省方而巡狩舉星畢曳雲梢召風伯以清塵命山靈而護野馳洛邑騖襄城天迴而地游雲合而霧沓周穆王來游太室先徴夏啓之居漢武帝有事嵩高即訪姒開之石徒觀其丹青歲古霜露年侵聖情有睠興言改葺其山則古文之外方其地則新邑之中土銘壇邐迤斜分玉女之臺碑闕相望近對石人之廟金草生而五色貝樹長而三花紫雲合沓於溪澗白霧氛氲於巖嶺考之易林信惟神明所伏求之遁甲固以威靈肅然夫其命有司乘務隙因高背下察隱嶙之餘基審曰觀星揆摧殘之落搆周官置臬郢匠揮斤異態神行全模造化紅葩奪曰飛累榭於山間綺綴衝風架迴廊於木末仙人在棟神女臨窗周施玳瑁之椽徧覆瑠璃之瓦赤玉爲階道黄金作門闕山如白岸樹似青溪羞藴藻於前庭藉生芻於後徑蘭香夾水居然洗沐之資竹帚臨風自隔囂塵之慘夢臺雲雨宋玉對而先驚楚璧山川屈原書而幾倦壽官憺兮不擾象設安兮逾肅霜羅曳曳雲錦披披鴛鴦褥兮翡翠幬白羽扇兮青絲履垂玉鸞之佩若往而若還戴金雀之釵不長而不短其居處也曖曖昧昧陰閉陽開其被服也煌煌熒熒霞駮雲蔚鼎俎則麟胎鳳卵烝蕙然蓂餌膳則木蜜金膏玉漿瓊酒當是時也合五嶽訊九魁選太陰命玄關馮夷鳴鼓女媧清歌左蒼龍兮吹箎右白虎兮縆瑟金眞拂座玉女焚香肅肅習習天媛來風雨霉霉霏霏神姬下霜雪孔雀飛而儀鳳舞弄玉邀歡軿車合而羅綺陳智瓊陪宴麻姑服道變海水而來遊織婦希風墳河津而下謁洛妃綽約江妃綿眇玄女以明月爲珠素女以穨雲作髻九天眞母八極夫人畢集於兹矣青霞衣兮翠雲裘靈連蜷兮旣留車迴風兮馬飛電視倏忽兮無見昔者濟陰山下降堯母之精靈湘川水曲留舜妃之響像壝壇或在徒聞分楅之名楝宇不修誰辯安歌之處豈知夫三仙楅地百姓尊祠挾王者之都畿當聖人之順動犧牲玉帛可以洽氣和神幼婦外孫可以披文相質虔奉綸旨式陳壯觀雖周人作詩自得后妃之美而魏臣獻賦終慚神女之工敢作銘曰九州地險五嶽天中蛟龍洞穴曰月仙宫蓄洩雲霧震蕩雷風笙歌近接鐘鼓遥通昔在嫣帝鴻泉未塞昏墊下人汎濫中國於鑠大禹顯允天德龍晝旁分螺書徧刻佩文壯海省土南方還從碣石更下台桑予娶有禮我都攸昌八年不顧四載惟荒宛委旣登轘轅佇鑿家室誤往熊羆方作天道幽祕生涯糺錯其化則遷其靈是託宓妃之館仙女之臺物類通感精魂去來巫山廟立漢水祠開壝壇歲古楝宇年摧皇矣大唐麗哉神聖應圖受籙體元居正赫赫高祖天有成命明明太宗於兹爲盛重光累洽下武嗣文負扆而化垂衣以君三靈肸蠁六氣氤氲魚鼈咸若鷄犬相聞重譯請命殊鄰禀朔化及中孚風移大朴天秩百禮人和萬樂汾水可遊崑山何邈隨巢舊說夏啓遺居盛德不泯嘉聲在諸周王轉蹕漢帝迴輿聿懷降鑒其祀如初虞衡掌木斑倕葺宇虹亘梅梁龍盤桂柱草積庭楥水周堂廡石室罕儔軒官爲輔珠簾洞捲玉座含清金翠的樂羅縠輕明儀形若動侍衛疑生依俙有物儆怳無聲帝子湘川天孫漢曲翩綿縹緲躊躇蹲躅神女弄珠靈妃啓玉倏來忽往星繁電燭壯矣麗矣神之聽之聰明是屬景福無欺夫人立館幼婦䥴辭巍巍皇室萬萬餘基唐嵩高山啓母廟碑銘
